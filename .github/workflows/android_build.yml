name: Build & Release Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (required for modern Android / Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Flutter (stable channel, pinned to flutter version in pubspec)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Run analysis (catches obvious errors without stopping the build)
      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      # 6. Build release APK (fat APK — works on all Android architectures)
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 7. Rename APK with version + short commit SHA for traceability
      - name: Rename APK
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ArtoryMovies-v${VERSION}-${SHA}.apk
          echo "APK_NAME=ArtoryMovies-v${VERSION}-${SHA}.apk" >> $GITHUB_ENV
          echo "APK_PATH=build/app/outputs/flutter-apk/ArtoryMovies-v${VERSION}-${SHA}.apk" >> $GITHUB_ENV

      # 8. Upload as workflow artifact (available in Actions tab for 30 days)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # 9. Create a GitHub Release with the APK as a downloadable asset
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "ArtoryMovies Build #${{ github.run_number }}"
          body: |
            ## 📱 ArtoryMovies Android APK

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built at:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Download the APK below
            2. On your Android phone, enable **Install from unknown sources**
            3. Open the downloaded APK and install

            > Built automatically by GitHub Actions
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
